<svg width="760" viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Diagrama de blocos do Altair 8800 na Tang Nano 20K</title>
  <desc>Nucleo i8080 ligado por um mux de barramento a RAM de 64 KB e ao 88-2SIO; FSM do painel comanda os serializadores 595 e 165 que falam com o painel externo de LEDs e chaves.</desc>
  <style>
    text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .t  { font-size: 14px; font-weight: 600; }
    .s  { font-size: 11.5px; }
    .tx { fill: #24292f; }
    .mut{ fill: #57606a; }
    .ln { stroke: #6e7781; }
    .cpu  rect { fill: #eeedfe; stroke: #534ab7; }
    .cpu  .t { fill: #3c3489; } .cpu .s { fill: #534ab7; }
    .mx   rect { fill: #f1efe8; stroke: #5f5e5a; }
    .mx   .t { fill: #444441; } .mx .s { fill: #5f5e5a; }
    .ram  rect { fill: #e1f5ee; stroke: #0f6e56; }
    .ram  .t { fill: #085041; } .ram .s { fill: #0f6e56; }
    .sio  rect { fill: #faece7; stroke: #993c1d; }
    .sio  .t { fill: #712b13; } .sio .s { fill: #993c1d; }
    .pnl  rect { fill: #e6f1fb; stroke: #185fa5; }
    .pnl  .t { fill: #0c447c; } .pnl .s { fill: #185fa5; }
    .ext  rect { fill: none; stroke: #6e7781; }
    @media (prefers-color-scheme: dark) {
      .tx { fill: #c9d1d9; } .mut { fill: #8b949e; }
      .ln { stroke: #8b949e; }
      .cpu rect { fill: #3c3489; stroke: #cecbf6; }
      .cpu .t { fill: #eeedfe; } .cpu .s { fill: #cecbf6; }
      .mx  rect { fill: #444441; stroke: #d3d1c7; }
      .mx  .t { fill: #f1efe8; } .mx .s { fill: #d3d1c7; }
      .ram rect { fill: #085041; stroke: #9fe1cb; }
      .ram .t { fill: #e1f5ee; } .ram .s { fill: #9fe1cb; }
      .sio rect { fill: #712b13; stroke: #f5c4b3; }
      .sio .t { fill: #faece7; } .sio .s { fill: #f5c4b3; }
      .pnl rect { fill: #0c447c; stroke: #b5d4f4; }
      .pnl .t { fill: #e6f1fb; } .pnl .s { fill: #b5d4f4; }
      .ext rect { stroke: #8b949e; }
    }
  </style>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#768390" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="20" y="50" width="580" height="390" rx="14" fill="none" class="ln" stroke-width="1" stroke-dasharray="6 5"/>
  <text class="t tx" x="36" y="76">Tang Nano 20K — GW2AR-18</text>

  <g class="cpu">
    <rect x="50" y="110" width="160" height="84" rx="8" stroke-width="1"/>
    <text class="t" x="130" y="138" text-anchor="middle">i8080</text>
    <text class="s" x="130" y="158" text-anchor="middle">núcleo 8080 completo</text>
    <text class="s" x="130" y="175" text-anchor="middle">1,23 MHz ou 27 MHz</text>
  </g>

  <g class="mx">
    <rect x="270" y="110" width="130" height="84" rx="8" stroke-width="1"/>
    <text class="t" x="335" y="146" text-anchor="middle">barramento</text>
    <text class="s" x="335" y="166" text-anchor="middle">mux CPU / painel</text>
  </g>

  <g class="ram">
    <rect x="440" y="86" width="140" height="60" rx="8" stroke-width="1"/>
    <text class="t" x="510" y="110" text-anchor="middle">RAM 64 KB</text>
    <text class="s" x="510" y="130" text-anchor="middle">BSRAM · boot.hex</text>
  </g>

  <g class="sio">
    <rect x="440" y="170" width="140" height="60" rx="8" stroke-width="1"/>
    <text class="t" x="510" y="194" text-anchor="middle">88-2SIO</text>
    <text class="s" x="510" y="214" text-anchor="middle">portas 10h / 11h</text>
  </g>

  <g class="pnl">
    <rect x="50" y="260" width="160" height="90" rx="8" stroke-width="1"/>
    <text class="t" x="130" y="288" text-anchor="middle">FSM do painel</text>
    <text class="s" x="130" y="308" text-anchor="middle">STOP · RUN · STEP</text>
    <text class="s" x="130" y="325" text-anchor="middle">EXAMINE · DEPOSIT</text>
  </g>

  <g class="pnl">
    <rect x="270" y="250" width="150" height="60" rx="8" stroke-width="1"/>
    <text class="t" x="345" y="274" text-anchor="middle">serializador 595</text>
    <text class="s" x="345" y="294" text-anchor="middle">40 bits de LEDs</text>
  </g>

  <g class="pnl">
    <rect x="270" y="340" width="150" height="60" rx="8" stroke-width="1"/>
    <text class="t" x="345" y="364" text-anchor="middle">serializador 165</text>
    <text class="s" x="345" y="384" text-anchor="middle">32 bits de chaves</text>
  </g>

  <g class="ext">
    <rect x="640" y="170" width="100" height="60" rx="8" stroke-width="1"/>
    <text class="t tx" x="690" y="194" text-anchor="middle">USB-C</text>
    <text class="s mut" x="690" y="214" text-anchor="middle">115200 8N1</text>
  </g>

  <g class="ext">
    <rect x="640" y="250" width="100" height="60" rx="8" stroke-width="1"/>
    <text class="t tx" x="690" y="274" text-anchor="middle">5× 74HC595</text>
    <text class="s mut" x="690" y="294" text-anchor="middle">36 LEDs</text>
  </g>

  <g class="ext">
    <rect x="640" y="340" width="100" height="60" rx="8" stroke-width="1"/>
    <text class="t tx" x="690" y="364" text-anchor="middle">4× 74HC165</text>
    <text class="s mut" x="690" y="384" text-anchor="middle">25 chaves</text>
  </g>

  <line x1="212" y1="152" x2="268" y2="152" class="ln" stroke-width="1.2" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <path d="M400 138 H420 V116 H438" class="ln" stroke-width="1.2" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <path d="M400 166 H420 V200 H438" class="ln" stroke-width="1.2" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <line x1="582" y1="200" x2="638" y2="200" class="ln" stroke-width="1.2" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>

  <line x1="130" y1="196" x2="130" y2="258" class="ln" stroke-width="1" stroke-dasharray="4 4" fill="none" marker-start="url(#ar)" marker-end="url(#ar)"/>
  <text class="s mut" x="140" y="226">pc_load · fronteira</text>
  <path d="M170 260 V238 H300 V198" class="ln" stroke-width="1" stroke-dasharray="4 4" fill="none" marker-end="url(#ar)"/>

  <line x1="212" y1="280" x2="268" y2="280" class="ln" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <line x1="268" y1="370" x2="214" y2="370" class="ln" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>

  <line x1="422" y1="280" x2="638" y2="280" class="ln" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <text class="s mut" x="530" y="270" text-anchor="middle">3 fios</text>
  <line x1="638" y1="370" x2="424" y2="370" class="ln" stroke-width="1.2" fill="none" marker-end="url(#ar)"/>
  <text class="s mut" x="530" y="360" text-anchor="middle">3 fios</text>

  <text class="s mut" x="36" y="424">clock único de 27 MHz · sem PLL · &lt;10% da lógica do GW2AR-18</text>
</svg>
